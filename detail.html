<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Title</title>
    <link rel="stylesheet" href="//unpkg.com/layui@2.6.8/dist/css/layui.css">
    <script src="//unpkg.com/layui@2.6.8/dist/layui.js"></script>
    <script src="//ajax.aspnetcdn.com/ajax/jQuery/jquery-1.8.0.js"></script>
    <script src="js/utils.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
</head>
<body>
<div id="view" class="layui-row layui-col-space15">
    加载中

</div>
<script id="demo" type="text/html">
    {{#layui.each(d.data, function(index, item){ }}
    <img src="{{item.pic}}" lay-src="{{item.pic}} " loading="lazy" style="width:90%;height:auto">第{{index+1}}页
    {{#}); }}
</script>
</body>
<script>
    var tp;
    if(localStorage.getItem("key")=="")
        tp=prompt("请输入一段文字");
    else {
        tp = localStorage.getItem("key")+"";
    };

    function xuanran(data){
        var getTpl = demo.innerHTML,view = document.getElementById('view');
        layui.laytpl(getTpl).render(data, function(html){
            view.innerHTML = html;
        });
        // layer.msg("加载好了 为了好的体验 系统sleep2秒");
        //
        // layui.use('flow', function(){
        //     var flow = layui.flow;
        //
        //     flow.lazyimg();
        // });
    }


    $.post("//"+tp+"/api/getpic",{bookid:getQueryString("bookid"),eps:getQueryString("eps")},function(result){
        xuanran(result)
        localStorage.setItem("key",tp);
    });
</script>
</html>
