<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="//unpkg.com/layui@2.6.8/dist/css/layui.css">
    <script src="//unpkg.com/layui@2.6.8/dist/layui.js"></script>
    <script src="http://ajax.aspnetcdn.com/ajax/jQuery/jquery-1.8.0.js"></script>
</head>
<body>
<div id="view" class="layui-row layui-col-space15">
    加载中
    <script id="demo" type="text/html">
        {{#layui.each(d.data, function(index, item){ }}
        <img src="{{item.pic}}" lay-src="{{item.pic}}">第{{index+1}}页
        {{#}); }}
    </script>
</div>
</body>
<script>
    var tp;
    if(localStorage.getItem("key")==null)
        tp=prompt("请输入一段文字");
    else tp=localStorage.getItem("key");
    function getQueryString(name) {
        var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)', 'i');
        var r = window.location.search.substr(1).match(reg);
        if (r != null) {
            return unescape(r[2]);
        }
        return null;
    }
    function xuanran(data){
        var getTpl = demo.innerHTML,view = document.getElementById('view');
        layui.laytpl(getTpl).render(data, function(html){
            view.innerHTML = html;
        });
    }
    layui.use('flow', function(){
        var flow = layui.flow;
        //当你执行这样一个方法时，即对页面中的全部带有 lay-src 的 img 元素开启了懒加载（当然你也可以指定相关 img）
        flow.lazyimg();
    });

    $.post("http://"+tp+"/api/getpic",{bookid:getQueryString("bookid"),eps:getQueryString("eps")},function(result){
        xuanran(result)
        localStorage.setItem("key",tp);
    });
</script>
</html>
