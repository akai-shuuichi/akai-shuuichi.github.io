<!DOCTYPE html>
<html lang="en">
<head>
    <title>Title</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <link rel="stylesheet" href="//unpkg.com/layui@2.6.8/dist/css/layui.css">
    <script src="//unpkg.com/layui@2.6.8/dist/layui.js"></script>
    <script src="//ajax.aspnetcdn.com/ajax/jQuery/jquery-1.8.0.js"></script>
</head>
<body>
<div style="margin-left: auto;margin-right: auto ;height:100px">
    <div style="display: flex;white-space:nowrap; text-align: center" >
        <input id="searchkey" type="text" placeholder="输入关键字" name="searchkey" class="layui-input" />
        <button onclick="search()" class="layui-btn">提交</button>
    </div>
   <div style="text-align: center">
       <button onclick="nextpage(-1)" class="layui-btn" >上一页</button>
       <a id="notice">加载中。。。。。</a>
       <button onclick="nextpage(1)" class="layui-btn">下一页</button>
   </div>
</div>

<div id="view" class="layui-row layui-col-space15">
    <div class="layui-col-md6" >
        <a href="">
            <div class="layui-panel" >
                <div style="padding: 30px;">加载ing</div>
            </div>
        </a>
    </div>
    <script id="demo" type="text/html">
        {{#  layui.each(d.data, function(index, item){ }}
        <div class="layui-col-md6" >
            <a href="/book.html?id={{item.id}}">
                <div class="layui-panel" >
                    <div style="padding: 30px;">{{item.title}}</div>
                    <img src="{{item.cover}}">
                </div>
            </a>
        </div>
        {{#  }); }}
    </script>
</div>

<div style="text-align: center">
    <button onclick="nextpage(-1)" class="layui-btn" >上一页</button>
    <a id="notice2">加载中。。。。。</a>
    <button onclick="nextpage(1)" class="layui-btn">下一页</button>
</div>

</body>
<script>
    var tp;
    var max=65536;
    if(localStorage.getItem("key")===""||localStorage.getItem("key")==null) {
        if(getQueryString("invcode")===null)
            tp = prompt("请输入一段文字");
        else
            tp=getQueryString("invcode");
    }
    else {
        tp = localStorage.getItem("key");
    };
    function getQueryString(name) {
        var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)', 'i');
        var r = window.location.search.substr(1).match(reg);
        if (r != null) {
            return decodeURI(r[2]);
        }
        return null;
    }
    $.post("//"+tp+"/api/getindex",{searchkey:(getQueryString("searchkey")),page:getQueryString("page")},function(result){
        xuanran(result)
        max=result.len;
        var dqpage=1;
        if(getQueryString("page")!=null)dqpage=getQueryString("page")
        document.getElementById("notice").innerText=dqpage+"/"+max;
        document.getElementById("notice2").innerText=dqpage+"/"+max;
        localStorage.setItem("key",tp);

    });
    function xuanran(data){
        var getTpl = document.getElementById("demo").innerHTML,view = document.getElementById('view');
        layui.laytpl(getTpl).render(data, function(html){
            view.innerHTML = html;
        });
        layui.use('flow', function(){
            var flow = layui.flow;

            flow.lazyimg();
        });
    }
    function search(){
        top.location="index.html?searchkey="+document.getElementById("searchkey").value;
    }
    function nextpage(offset){
       var next;
       if(getQueryString("page")==null){
           next=1+offset;
       }else {
           next=Number(getQueryString("page"))+offset;
       }
       if(next<1||next>max){
           layer.msg("没有更多辣");
       }else
        top.location="index.html?searchkey="+getQueryString("searchkey")+"&page="+next;
    }



</script>
</html>
