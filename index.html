<!DOCTYPE html>
<html lang="en">
<head>
    <title>Title</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <link rel="stylesheet" href="//unpkg.com/layui@2.6.8/dist/css/layui.css">
    <script src="//unpkg.com/layui@2.6.8/dist/layui.js"></script>
    <script src="//ajax.aspnetcdn.com/ajax/jQuery/jquery-1.8.0.js"></script>
    <script src="js/utils.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        .list {
            width: 100%;
            margin-bottom: 5px;
            padding: 0px;
        }
        .cl {
            zoom: 1;
        }
        ul {
            display:table-row  ;
            list-style-type: disc;
            margin-block-start: 1em;
            margin-block-end: 1em;
            margin-inline-start: 0px;
            margin-inline-end: 0px;
            padding-inline-start: 30px;
        }
        .list li {
            font: 12px/1.5 "Microsoft Yahei","Helvetica Neue";
            color: #ccc;
            margin: 0;
            list-style: none;
            list-style-type: none;
            width: 25%;
            float: left;
            padding: 10px 0 0 10px;
            -webkit-box-sizing: border-box;
        }
        .list li img {
            font: 12px/1.5 "Microsoft Yahei","Helvetica Neue";
            list-style: none;
            list-style-type: none;
            color: #ccc;
            aspect-ratio: auto 205 / 277;
            border: 0;
            width: 100%;
            height: auto;
            vertical-align: top;
            display:table-row  ;
            border-radius: 8px;

        }
        ul ul {
            list-style-type: circle;
            margin-block-start: 0px;
            margin-block-end: 0px;
        }

        div {
            display: block;
        }

        .txtbts{
            font: 12px/1.5 "Microsoft Yahei","Helvetica Neue";
            list-style: none;
            list-style-type: none;
            margin: 0;
            padding: 0;
            font-weight: bold;
            width: 80%;
            height: 37px;
            line-height: 12px;
            font-size: 12px;
            color: #333;
            overflow: hidden;
            white-space: normal;
            text-overflow: clip;
            background: #fff;
            text-align: center;
        }
        body{
            margin: 0;
            padding: 0;
            font: 12px/1.5 "Microsoft Yahei","Helvetica Neue";
            color: #ccc;
            height: 100%!important;
        }
        .ft{
            font: 12px/1.5 "Microsoft Yahei","Helvetica Neue";
            color: #ccc;
            margin: 0;
            padding: 0;
            zoom: 1;
            width: 100%;
            position: relative;
            margin-top: 10px;
            margin-left: 1%;
        }
        .bd{
            font: 12px/1.5 "Microsoft Yahei","Helvetica Neue";
            color: #ccc;
            margin: 0;
            position: relative;
            padding: 0 6px;
            margin-left: -1px;
        }

    </style>
</head>
<body>


<div class="body pos bd">
    <div style="height:50px">
        <div style="display: flex;white-space:nowrap; " >
            <input id="searchkey" type="text" placeholder="输入关键字" name="searchkey" class="layui-input text-align: center;" />
            <button id="search" onclick="search()" class="layui-btn">搜索</button>
        </div>
    </div>
        <ul id="view" class="cl list">
            <li>
                <a href=""><img src="" alt="" width="205" height="277">
                    <div class="txtbts"></div></a>
            </li>
        </ul>
    <div  style="text-align: center">
        <button onclick="nextpage(-1)" class="layui-btn" >上一页</button>
        <a id="notice2">加载中。。。。。</a>
        <button onclick="nextpage(1)" class="layui-btn">下一页</button>
    </div>
</div>


<script id="demo" type="text/html">
    {{#  layui.each(d.data, function(index, item){ }}

    <li>
        <a href="/book.html?id={{item.id}}">
            <img src="{{item.cover}}" width="205" height="277">
            <div class="txtbts">{{item.title}}</div>
        </a>
    </li>
    {{#  }); }}
</script>



</body>
<script>
    var tp;
    var max=65536;
    if(localStorage.getItem("key")===""||localStorage.getItem("key")==null) {
        if(getQueryString("invcode")===null)
            tp = prompt("请输入一段文字");
        else
            tp=getQueryString("invcode");
    }
    else {
        tp = localStorage.getItem("key");
    };
    document.onkeydown = function (event) {
        var e = event || window.event;
        if (e && e.keyCode === 13) { //回车键的键值为13
           document.getElementById("search").click(); //调用登录按钮的登录事件
        }
    };

    $.post("//"+tp+"/api/getindex",{searchkey:(getQueryString("searchkey")),page:getQueryString("page")},function(result){
        xuanran(result)
        max=result.len;
        var dqpage=1;
        if(getQueryString("page")!=null)dqpage=getQueryString("page")

        document.getElementById("notice2").innerText=dqpage+"/"+max;
        localStorage.setItem("key",tp);

    });
    if(getQueryString("searchkey")!=null){
        document.getElementById("searchkey").value=getQueryString("searchkey");
    }
    function xuanran(data){
        var getTpl = document.getElementById("demo").innerHTML,view = document.getElementById('view');
        layui.laytpl(getTpl).render(data, function(html){
            view.innerHTML = html;
        });
        layui.use('flow', function(){
            var flow = layui.flow;

            flow.lazyimg();
        });
    }
    function search(){
       let loa= layer.load();
        $.post("//"+tp+"/api/getindex",{searchkey:(document.getElementById("searchkey").value),page:1},function(result){
            layer.close(loa);
            xuanran(result)
            max=result.len;
            var dqpage=1;
            if(getQueryString("page")!=null)dqpage=getQueryString("page")
            document.getElementById("notice2").innerText=dqpage+"/"+max;
            localStorage.setItem("key",tp);
        });
    }
    function nextpage(offset){
       var next;
       if(getQueryString("page")==null){
           next=1+offset;
       }else {
           next=Number(getQueryString("page"))+offset;
       }
       if(next<1||next>max){
           layer.msg("没有更多辣");
       }else
        top.location="index.html?searchkey="+document.getElementById("searchkey").value+"&page="+next;
    }
</script>
</html>
