<script>
    var serverlist=[
        "bikletmeseesee-production.up.railway.app",
        "bikaletmesese.herokuapp.com",
        "bika-akai-shuuichi.koyeb.app",
    ];
    function use(data){
        if(data.getElementsByClassName("layui-form-switch")[0].getElementsByTagName("em")[0].innerText=='开启'){
            localStorage.setItem("use",0)
        }else{
            localStorage.setItem("use",1)
        }
    }

    init();
    function init(){
        setTimeout(function (){
            if(localStorage.getItem("use")==0){
                document.getElementsByClassName("layui-form-switch")[0].click()
            }
        },10)
        let demo=localStorage.getItem("key");
        let index=0;
        for(let i=0;i<serverlist.length;i++){
            if(serverlist[i]==demo){
                index=i;
            }
            $.get("//"+serverlist[i],
            function (){
                document.getElementById("server"+(i+1)).getElementsByClassName("layui-col-xs5")[1].innerText="能用"
            }).fail(function () {
                document.getElementById("server"+(i+1)).getElementsByClassName("layui-col-xs5")[1].innerText="不能用"
            });
        }
        document.getElementById("nowserver").innerText="当前服务器: 节点"+(index+1);

    }
