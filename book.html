<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <link rel="stylesheet" href="//unpkg.com/layui@2.6.8/dist/css/layui.css">
  <script src="//unpkg.com/layui@2.6.8/dist/layui.js"></script>
  <script src="//ajax.aspnetcdn.com/ajax/jQuery/jquery-1.8.0.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="js/utils.js"></script>
</head>
<body>
<div id="view" class="layui-card" align="center" width="50%" style="margin-inside: 50px;width: 500px ;margin-left:auto;margin-right:auto;margin-top:50px" >
  加载ing

  <script id="demo" type="text/html">
    {{#  layui.each(d.data, function(index, item){ }}
    <div onclick=do1({{index+1}}) class="layui-card-header" style="font-size: 50px;margin-top:auto;margin-bottom:auto;"><a>{{item.title}}</a></div>
    {{#  }); }}
  </script>
</div>

</body>
<script>
  var tp;
  if(localStorage.getItem("key")=="")
    tp=prompt("请输入一段文字");
  else {
    tp = localStorage.getItem("key")+"";

  };

  $.post("//"+tp+"/api/geteps",{bookid:getQueryString("id")},function(result){
    xuanran(result)
    localStorage.setItem("key",tp);
  });
  function xuanran(data){
    var getTpl = demo.innerHTML,view = document.getElementById('demo');
    layui.laytpl(getTpl).render(data, function(html){
      view.innerHTML = html;
    });

  }
  function do1(index){
    top.location="detail.html?bookid="+getQueryString("id")+"&eps="+index;
  }
</script>
</html>
